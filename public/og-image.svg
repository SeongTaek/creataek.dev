<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34799e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34799e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top glow strip -->
  <rect x="0" y="0" width="1200" height="3" fill="#34799e"/>

  <!-- Left glow panel -->
  <rect x="0" y="0" width="500" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="5" height="310" fill="#34799e" rx="2"/>

  <!-- Name -->
  <text x="115" y="255" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif" font-size="100" font-weight="700" fill="white">임성택</text>

  <!-- Role -->
  <text x="118" y="335" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="600" fill="#7ec8e3" letter-spacing="2">Game Client Developer</text>

  <!-- Divider -->
  <rect x="118" y="368" width="900" height="2" fill="#7ec8e3" opacity="0.4" rx="1"/>

  <!-- Tags -->
  <text x="118" y="430" font-family="'Segoe UI', Arial, sans-serif" font-size="36" fill="#e2e8f0" letter-spacing="1">Unreal Engine  ·  Unity  ·  C++  ·  C#  ·  10년 경력</text>

  <!-- Career -->
  <text x="118" y="500" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif" font-size="36" font-weight="600" fill="#f1f5f9">로스트아크  ·  닥터 마리오 월드</text>

  <!-- Domain badge -->
  <rect x="118" y="530" width="310" height="44" rx="22" fill="#34799e" opacity="0.35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="273" y="558" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">creataekdev.vercel.app</text>

  <!-- Decorative circle right -->
  <circle cx="1020" cy="315" r="220" fill="none" stroke="#34799e" stroke-width="1" opacity="0.15"/>
  <circle cx="1020" cy="315" r="150" fill="none" stroke="#34799e" stroke-width="1" opacity="0.1"/>
  <circle cx="1020" cy="315" r="80" fill="#34799e" opacity="0.06"/>
  <circle cx="1020" cy="315" r="30" fill="#34799e" opacity="0.15"/>
</svg>
